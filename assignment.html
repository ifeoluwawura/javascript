<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-80">
        <h2 class="text-2xl font-bold text-center mb-6">Miniutes to seconds conversion</h2>

        <form id="convertTo">
            <div class="mb-4">
                <label class="block text-sm mb-1"></label>
                <input type="text" id="userInput" placeholder="Enter number in mins to be converted to seconds" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <p id="message"></p>
            <button class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                Submit
            </button>
    

    

    <script src="assignment.js"></script>
</body>
</html>
